<!DOCTYPE html>
<html lang="en" >

<head>
  <meta charset="UTF-8">
  <title>Template Exercise 1</title>
</head>

<body>

  <script id="handlebars-Exercise" type="text/x-handlebars-template">
<div id = "content">
You can find me in <b>{{city}}</b> .My address is <b>{{number}} {{street}}.</b></div>
  </script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.8/handlebars.min.js"></script>
<script>

const context={
    "city": "London",
    "street": "Baker Street",
    "number": "221B"
}
let template = Handlebars.compile(document.querySelector('#handlebars-Exercise').innerHTML)
let thecontent = template(context);

document.body.innerHTML  = thecontent;
</script>
</body>
</html>
